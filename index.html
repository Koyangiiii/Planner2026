<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Next</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
--bg-main: #ffe6f0;
--paper: #ffffff;
--accent-pink: #eb7aa6;
--accent-yellow: #fcf2b6;
}

body {
background-color: var(--bg-main);
/* ลายเส้นสมุดแนวตั้ง */
background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
overflow: hidden;
height: 100vh;
width: 100vw;
display: flex;
align-items: center;
justify-content: center;
margin: 0;
}

.font-signature { font-family: 'Dancing Script', cursive; }

.main-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 50px; 
    text-align: center;
    width: 100%;
}

/* ชื่อ Planner2026 */
.planner-highlight {
    font-size: clamp(4rem, 18vw, 8.5rem);
    line-height: 1.1;
    color: var(--accent-pink);
    text-shadow: 4px 4px 0px var(--accent-yellow);
    filter: drop-shadow(2px 2px 10px rgba(235, 122, 166, 0.3));
    display: inline-block;
    position: relative;
    z-index: 10;
}

/* ปุ่มวงกลมใหญ่จิ้มง่าย */
.btn-next-circle {
    width: 100px;
    height: 100px;
    background-color: var(--paper);
    border: 4px solid var(--accent-pink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(235, 122, 166, 0.3);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
    cursor: pointer;
}

/* สามเหลี่ยมหันไปทางขวา */
.triangle-right {
    width: 0;
    height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-left: 32px solid var(--accent-pink);
    margin-left: 8px; /* ปรับให้ดูอยู่กลางวงกลมพอดี */
    transition: all 0.3s ease;
}

.btn-next-circle:hover {
    transform: scale(1.15);
    background-color: var(--accent-pink);
}

.btn-next-circle:hover .triangle-right {
    border-left-color: white;
}

.btn-next-circle:active {
    transform: scale(0.95);
}

/* ตกแต่งเทป */
.tape {
    position: absolute;
    top: -15px;
    left: 15%;
    width: 110px;
    height: 30px;
    background-color: #ffb6c1;
    opacity: 0.4;
    mix-blend-mode: multiply;
    clip-path: polygon(5% 0%, 95% 10%, 90% 90%, 0% 100%);
    z-index: -1;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}
.float-anim {
    animation: float 4s ease-in-out infinite;
}

.nav-text {
    font-family: sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent-pink);
    margin-top: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
}
</style>
</head>
<body>

<div class="main-content">
    
    <!-- ส่วนชื่อ -->
    <div class="relative float-anim">
        <div class="tape"></div>
        <h1 class="font-signature planner-highlight">
            Planner2026
        </h1>
    </div>

    <!-- ปุ่มวงกลมและสามเหลี่ยม -->
    <div class="flex flex-col items-center">
        <a href="menu.html" class="btn-next-circle" title="Go to Next Page">
            <div class="triangle-right"></div>
        </a>
        <div class="nav-text">Tap to Start</div>
    </div>

</div>

</body>
</html>

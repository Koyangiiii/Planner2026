<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
--bg-main: #ffe6f0;
--paper: #ffffff;
--accent-pink: #eb7aa6;
--accent-yellow: #fcf2b6;
}
body {
background-color: var(--bg-main);
/* พื้นหลังลายตาราง/เส้นสมุดแบบเดิม */
background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
overflow: hidden; /* ล็อคหน้าจอไม่ให้เลื่อน */
height: 100vh;
width: 100vw;
display: flex;
align-items: center;
justify-content: center;
}
.font-signature { font-family: 'Dancing Script', cursive; }

/* ปุ่มวงกลมไปหน้าถัดไป */
.menu-circle {
    position: fixed;
    top: 25px;
    right: 25px;
    width: 55px;
    height: 55px;
    background-color: var(--paper);
    border: 2px solid var(--accent-pink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-pink);
    font-size: 1.4rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(235, 122, 166, 0.2);
    z-index: 100;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
}
.menu-circle:hover {
    background-color: var(--accent-pink);
    color: white;
    transform: scale(1.1) rotate(15deg);
}

/* ปรับขนาด Planner2026 ให้ใหญ่เต็มตา */
.planner-highlight {
    font-size: clamp(4rem, 20vw, 9rem);
    line-height: 1;
    text-shadow: 5px 5px 0px var(--accent-yellow);
    filter: drop-shadow(2px 2px 10px rgba(235, 122, 166, 0.3));
    display: inline-block;
}

.tape { position: absolute; mix-blend-mode: multiply; opacity: 0.8; z-index: -1; }
.tape-pink { 
    background-color: #ffb6c1; 
    clip-path: polygon(1% 2%, 99% 0%, 98% 98%, 0% 100%); 
}

@keyframes float {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-15px) rotate(0deg); }
}
.hero-container {
    animation: float 4s ease-in-out infinite;
    text-align: center;
}
</style>
</head>
<body>

<!-- ปุ่มไปหน้า Menu -->
<a href="menu.html" class="menu-circle" title="Go to Menu">
    <span style="margin-left: 4px;">►</span>
</a>

<!-- ส่วนแสดงผลหลัก -->
<div class="hero-container relative">
    <div class="relative inline-block">
        <!-- เทปแปะตกแต่งข้างหลัง -->
        <div class="tape tape-pink -top-10 left-0 w-32 h-10 opacity-40"></div>
        <h1 class="font-signature planner-highlight text-[#eb7aa6]">
            Planner2026
        </h1>
        <!-- ของตกแต่งเล็กๆ -->
        <span class="absolute -top-6 -right-10 text-4xl">✨</span>
    </div>
</div>

</body>
</html>

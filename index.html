<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Home</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Mitr:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --accent-yellow: #fcf2b6;
    --error-red: #ff4d4d;
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    font-family: 'Mitr', sans-serif;
}

.font-signature { font-family: 'Dancing Script', cursive; }

.main-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 35px; 
    text-align: center;
    width: 100%;
}

.planner-highlight {
    font-size: clamp(3.5rem, 15vw, 7.5rem);
    line-height: 1.1;
    color: var(--accent-pink);
    text-shadow: 4px 4px 0px var(--accent-yellow);
    filter: drop-shadow(2px 2px 10px rgba(235, 122, 166, 0.3));
    display: inline-block;
}

/* ส่วนของ Input */
.input-wrapper {
    width: 300px;
    position: relative;
}

.name-input {
    width: 100%;
    padding: 15px 20px;
    border-radius: 50px;
    border: 3px solid white;
    background: rgba(255, 255, 255, 0.9);
    color: #8a516b;
    font-size: 1.2rem;
    text-align: center;
    outline: none;
    box-shadow: 0 8px 20px rgba(235, 122, 166, 0.15);
    transition: all 0.3s ease;
}

.name-input:focus {
    border-color: var(--accent-pink);
    transform: translateY(-2px);
}

.name-input.error {
    border-color: var(--error-red);
    animation: shake 0.4s ease-in-out;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

#status-msg {
    margin-top: 10px;
    font-size: 0.85rem;
    height: 1.2rem;
    color: var(--accent-pink);
    font-weight: 500;
}

/* ปุ่มวงกลม */
.btn-next-circle {
    width: 90px;
    height: 90px;
    background-color: var(--paper);
    border: 4px solid var(--accent-pink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(235, 122, 166, 0.2);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
    opacity: 0.4;
    cursor: not-allowed;
    filter: grayscale(1);
}

.btn-next-circle.unlocked {
    opacity: 1;
    cursor: pointer;
    filter: grayscale(0);
}

.triangle-right {
    width: 0;
    height: 0;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-left: 28px solid var(--accent-pink);
    margin-left: 6px; 
}

.btn-next-circle.unlocked:hover {
    transform: scale(1.15) rotate(5deg);
    background-color: var(--accent-pink);
}

.btn-next-circle.unlocked:hover .triangle-right {
    border-left-color: white;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}
.float-anim { animation: float 4s ease-in-out infinite; }

.nav-text {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent-pink);
    margin-top: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
}
</style>
</head>
<body>

<div class="main-content">
    
    <div class="relative float-anim">
        <h1 class="font-signature planner-highlight">
            Planner2026
        </h1>
    </div>

    <!-- ช่องใส่ชื่อ -->
    <div class="input-wrapper">
        <input type="text" id="nameInput" class="name-input" placeholder="พิมพ์ชื่อให้ถูกต้อง..." autocomplete="off">
        <div id="status-msg">ใครเอ่ย? กรุณาระบุชื่อของคุณ ✨</div>
    </div>

    <!-- ปุ่มวงกลม -->
    <div class="flex flex-col items-center">
        <a href="javascript:void(0)" id="nextBtn" class="btn-next-circle">
            <div class="triangle-right"></div>
        </a>
        <div class="nav-text" id="navLabel">LOCKED</div>
    </div>

</div>

<script>
    // กำหนดชื่อที่อนุญาตที่นี่
    const AUTHORIZED_NAME = "เจ้าแมวอ้วน"; 
    
    const nameInput = document.getElementById('nameInput');
    const nextBtn = document.getElementById('nextBtn');
    const statusMsg = document.getElementById('status-msg');
    const navLabel = document.getElementById('navLabel');

    nameInput.addEventListener('input', function() {
        const value = this.value.trim();
        
        if (value === AUTHORIZED_NAME) {
            // กรณีชื่อถูกต้อง
            unlockButton();
        } else if (value.length > 0) {
            // กรณีเริ่มพิมพ์แต่ยังไม่ถูก
            lockButton();
            statusMsg.innerText = "ชื่อนี้ไม่ได้รับอนุญาตนะ ❌";
            statusMsg.style.color = "#ff4d4d";
            nameInput.classList.add('error');
        } else {
            // กรณีช่องว่าง
            lockButton();
            statusMsg.innerText = "ใครเอ่ย? กรุณาระบุชื่อของคุณ ✨";
            statusMsg.style.color = "#eb7aa6";
            nameInput.classList.remove('error');
        }
    });

    function unlockButton() {
        nextBtn.classList.add('unlocked');
        nextBtn.href = "menu.html"; // หน้าที่จะไป
        statusMsg.innerText = "ยินดีต้อนรับ " + AUTHORIZED_NAME + "! ✅";
        statusMsg.style.color = "#4CAF50";
        navLabel.innerText = "GO TO MENU";
        nameInput.classList.remove('error');
        // เก็บชื่อไว้ใช้ในหน้าอื่น
        localStorage.setItem('planner_user', AUTHORIZED_NAME);
    }

    function lockButton() {
        nextBtn.classList.remove('unlocked');
        nextBtn.href = "javascript:void(0)";
        navLabel.innerText = "LOCKED";
    }

    // กันเหนียว: ถ้ากดตอนที่ยังล็อคอยู่
    nextBtn.addEventListener('click', function(e) {
        if (!this.classList.contains('unlocked')) {
            e.preventDefault();
            nameInput.classList.add('error');
            setTimeout(() => nameInput.classList.remove('error'), 400);
        }
    });
</script>

</body>
</html>

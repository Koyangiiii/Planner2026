<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Music Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --text-dark: #8a516b;
    --header-font: 'Dancing Script', cursive;
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    font-family: 'Mitr', sans-serif;
    color: var(--text-dark);
    margin: 0;
    padding: 20px 10px;
    min-height: 100vh;
}

.profile-board {
    background-color: var(--paper);
    width: 100%;
    max-width: 800px; 
    margin: 0 auto;
    padding: 80px 30px 40px;
    border-radius: 40px;
    box-shadow: 0 15px 40px rgba(235, 122, 166, 0.2);
    border: 3px solid white;
    position: relative;
}

.nav-group {
    position: absolute;
    top: 25px;
    left: 25px;
    display: flex;
    gap: 10px;
}

.nav-button {
    background-color: #fffafa;
    color: var(--accent-pink);
    width: 45px;
    height: 45px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    text-decoration: none;
    border: 1px solid rgba(235, 122, 166, 0.2);
    transition: all 0.3s ease;
}

.nav-button:hover {
    background-color: var(--accent-pink);
    color: white;
    transform: translateY(-3px);
}

.profile-header {
    text-align: center;
    margin-bottom: 30px;
    position: relative;
}

/* --- Music Player Style Starts Here --- */

/* Animation สำหรับรูปหมุน */
@keyframes rotateDisc {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.player-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 50px; /* เพิ่ม margin bottom สำหรับปุ่ม */
    display: flex;
    align-items: center;
    justify-content: center;
}

/* แถบ Progress Bar รอบวงกลม */
.player-progress-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 4px solid #fffafa; /* สีพื้นหลังแถบ */
    border-top-color: var(--accent-pink); /* สี Progress */
    animation: rotateDisc 4s linear infinite; /* วิ่งวนจำลอง Progress */
}

/* Container รูปภาพ (แผ่นเสียง) */
.profile-img-container {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 10px solid #333; /* ขอบแผ่นเสียงสีดำ */
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: transform 0.3s ease;
    
    /* สั่งให้หมุนช้าๆ */
    animation: rotateDisc 10s linear infinite;
    animation-play-state: running; /* เริ่มต้นให้เล่น */
}

/* สไตล์เมื่อหยุดเล่น */
.profile-img-container.paused {
    animation-play-state: paused;
}

.profile-img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
 
/* รูตรงกลางแผ่นเสียง */
.profile-img-container::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    background: var(--paper);
    border-radius: 50%;
    box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
    z-index: 3;
}

/* ปุ่มควบคุมเพลง */
.player-controls {
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    color: var(--accent-pink);
    font-size: 1.5rem;
    z-index: 4;
}

.control-btn {
    cursor: pointer;
    transition: transform 0.2s, color 0.2s;
}

.control-btn:hover {
    color: var(--text-dark);
    transform: scale(1.1);
}

/* --- Music Player Style Ends Here --- */

[contenteditable="true"] {
    outline: none;
    padding: 2px 5px;
    border-radius: 5px;
    transition: background 0.2s;
}

[contenteditable="true"]:hover { background: rgba(235, 122, 166, 0.05); }
[contenteditable="true"]:focus { background: rgba(235, 122, 166, 0.1); border-bottom: 1px dashed var(--accent-pink); }

.profile-name {
    font-family: var(--header-font);
    font-size: 3rem;
    color: var(--accent-pink);
    text-shadow: 1px 1px 0px #fcf2b6;
    display: inline-block;
}

.info-item {
    background: #fffafa;
    padding: 15px 20px;
    border-radius: 20px;
    border: 1px solid rgba(235, 122, 166, 0.1);
    margin-bottom: 15px;
}

.info-label {
    font-weight: 600;
    color: var(--accent-pink);
    font-size: 0.85rem;
    text-transform: uppercase;
}

.info-value { display: block; font-size: 1.1rem; min-height: 1.5em; }

@media (max-width: 640px) {
    .nav-group { top: 15px; left: 15px; }
    .nav-button { width: 40px; height: 40px; }
    .player-container { width: 160px; height: 160px; margin-bottom: 40px;}
    .profile-img-container { width: 130px; height: 130px; border-width: 7px; }
    .profile-name { font-size: 2.2rem; }
    .player-controls { font-size: 1.2rem; bottom: -30px; }
}
</style>
</head>
<body>

    <div class="profile-board">
        <div class="nav-group">
            <a href="menu.html" class="nav-button" title="Home"><i class="fa-solid fa-house"></i></a>
            <a href="calendar.html" class="nav-button" title="Calendar"><i class="fa-solid fa-calendar-days"></i></a>
        </div>

        <div class="profile-header">
            <div class="player-container">
                <div class="player-progress-ring"></div> <div id="discContainer" class="profile-img-container" onclick="handleDiscClick()">
                    <img id="profileImage" src="https://via.placeholder.com/150" alt="Profile">
                </div>
                
                <div class="player-controls">
                    <i class="fa-solid fa-backward-step control-btn"></i>
                    <i id="playPauseBtn" class="fa-solid fa-pause control-btn" onclick="togglePlay()"></i>
                    <i class="fa-solid fa-forward-step control-btn"></i>
                </div>
            </div>
            
            <input type="file" id="fileInput" hidden accept="image/*">
            
            <h1 class="profile-name" id="userName" contenteditable="true">My Profile</h1>
            <p id="userTagline" contenteditable="true" style="color: #db96b4;">Click to edit tagline</p>
        </div>

        <div class="profile-info-grid">
            <div class="info-item">
                <span class="info-label">Full Name</span>
                <span class="info-value" id="fullName" contenteditable="true">Somchai Jaidee</span>
            </div>
            
            <div class="info-item">
                <span class="info-label">Birthday</span>
                <span class="info-value" id="birthday" contenteditable="true">01 January 2000</span>
            </div>

            <div class="info-item">
                <span class="info-label">Hobbies</span>
                <span class="info-value" id="hobbies" contenteditable="true">Coding, Reading</span>
            </div>

            <div class="info-item">
                <span class="info-label">Goals for 2026</span>
                <span class="info-value" id="goals" contenteditable="true">Mastering Web Dev</span>
            </div>
        </div>

        <div class="quote-section" id="quote" contenteditable="true">
            "The best way to predict the future is to create it."
        </div>
    </div>

    <script>
        const discContainer = document.getElementById('discContainer');
        const playPauseBtn = document.getElementById('playPauseBtn');

        // ฟังก์ชันจัดการเมื่อคลิกที่แผ่นเสียง (เพื่ออัปโหลดรูป)
        function handleDiscClick() {
            // เราจะอนุญาตให้อัปโหลดรูปเฉพาะเมื่อเพลง "หยุด" อยู่เท่านั้น
            if (discContainer.classList.contains('paused')) {
                document.getElementById('fileInput').click();
            } else {
                alert("Please pause the player before changing the photo!");
            }
        }

        // ฟังก์ชัน สลับสถานะ เล่น/หยุด
        function togglePlay() {
            discContainer.classList.toggle('paused');
            
            // เปลี่ยนไอคอน
            if (discContainer.classList.contains('paused')) {
                playPauseBtn.classList.remove('fa-pause');
                playPauseBtn.classList.add('fa-play');
            } else {
                playPauseBtn.classList.remove('fa-play');
                playPauseBtn.classList.add('fa-pause');
            }
        }

        // --- ส่วนบันทึกข้อมูลเดิม ---
        const fields = ['userName', 'userTagline', 'fullName', 'birthday', 'hobbies', 'goals', 'quote'];
        
        window.onload = () => {
            fields.forEach(id => {
                const savedValue = localStorage.getItem(id);
                if (savedValue) document.getElementById(id).innerText = savedValue;
            });
            const savedImg = localStorage.getItem('profileImage');
            if (savedImg) document.getElementById('profileImage').src = savedImg;
            
            // เริ่มต้นหน้ามาให้แผ่นเสียงหมุนเลย
            discContainer.classList.remove('paused');
        };

        fields.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                localStorage.setItem(id, document.getElementById(id).innerText);
            });
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 300;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_WIDTH) {
                            width *= MAX_WIDTH / height;
                            height = MAX_WIDTH;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('profileImage').src = dataUrl;
                    localStorage.setItem('profileImage', dataUrl);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Spotify Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --spotify-green: #1DB954;
    --text-dark: #8a516b;
    --header-font: 'Dancing Script', cursive;
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    font-family: 'Mitr', sans-serif;
    color: var(--text-dark);
    margin: 0;
    padding: 20px 10px;
    min-height: 100vh;
}

.profile-board {
    background-color: var(--paper);
    width: 100%;
    max-width: 800px; 
    margin: 0 auto;
    padding: 80px 30px 40px;
    border-radius: 40px;
    box-shadow: 0 15px 40px rgba(235, 122, 166, 0.2);
    border: 3px solid white;
    position: relative;
    overflow: hidden;
}

.nav-group {
    position: absolute;
    top: 25px;
    left: 25px;
    display: flex;
    gap: 10px;
    z-index: 10;
}

.nav-button {
    background-color: rgba(255, 255, 255, 0.8);
    color: var(--accent-pink);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

.nav-button:hover {
    background-color: var(--accent-pink);
    color: white;
}

/* --- Spotify Player Section --- */

.spotify-container {
    position: relative;
    width: 100%;
    max-width: 350px;
    margin: 0 auto 30px;
    text-align: center;
}

/* พื้นหลังฟุ้งๆ ด้านหลังรูป */
.bg-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120%; height: 120%;
    background: var(--accent-pink);
    filter: blur(60px);
    opacity: 0.15;
    z-index: 0;
    border-radius: 50%;
}

.album-art-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 20px;
    z-index: 2;
}

.album-art {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    object-fit: cover;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 0.3s ease;
}

.album-art-wrapper:hover .album-art {
    transform: scale(1.02);
}

/* ไอคอนกล้องตอน Hover */
.upload-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 2rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

.album-art-wrapper:hover .upload-overlay {
    opacity: 1;
}

/* Progress Bar */
.progress-container {
    width: 100%;
    margin: 15px 0 10px;
    cursor: pointer;
}

.progress-bar-bg {
    width: 100%;
    height: 4px;
    background: rgba(235, 122, 166, 0.2);
    border-radius: 2px;
    position: relative;
}

.progress-bar-fill {
    height: 100%;
    width: 30%; /* ปรับผ่าน JS */
    background: var(--accent-pink);
    border-radius: 2px;
    position: relative;
}

.progress-bar-fill::after {
    content: '';
    position: absolute;
    right: -5px; top: -4px;
    width: 12px; height: 12px;
    background: var(--accent-pink);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
}

.progress-container:hover .progress-bar-fill::after {
    opacity: 1;
}

.time-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: #db96b4;
    margin-top: 5px;
}

/* Controls */
.spotify-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
    font-size: 1.4rem;
    margin-top: 10px;
}

.play-btn {
    width: 55px;
    height: 55px;
    background: var(--accent-pink);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 5px 15px rgba(235, 122, 166, 0.4);
}

.heart-btn {
    position: absolute;
    right: 0;
    bottom: 100px;
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
    color: #db96b4;
}

.heart-btn.liked {
    color: #ff4d4d;
    transform: scale(1.2);
}

/* Content Editable */
[contenteditable="true"] { outline: none; border-radius: 5px; }
[contenteditable="true"]:focus { background: rgba(235, 122, 166, 0.05); }

.info-item {
    background: #fffafa;
    padding: 15px 20px;
    border-radius: 15px;
    border: 1px solid rgba(235, 122, 166, 0.1);
    margin-bottom: 12px;
}

.info-label { font-weight: 600; color: var(--accent-pink); font-size: 0.8rem; letter-spacing: 1px; }
.info-value { display: block; font-size: 1.1rem; }

</style>
</head>
<body>

    <div class="profile-board">
        <div class="nav-group">
            <a href="menu.html" class="nav-button"><i class="fa-solid fa-chevron-left"></i></a>
            <a href="calendar.html" class="nav-button"><i class="fa-solid fa-calendar"></i></a>
        </div>

        <div class="spotify-container">
            <div class="bg-glow"></div>
            
            <div class="album-art-wrapper" onclick="document.getElementById('fileInput').click()">
                <img id="profileImage" class="album-art" src="https://via.placeholder.com/300x300?text=Your+Photo" alt="Cover">
                <div class="upload-overlay"><i class="fa-solid fa-camera"></i></div>
            </div>

            <i id="heartBtn" class="fa-solid fa-heart heart-btn" onclick="toggleLike()"></i>

            <div id="userName" contenteditable="true" class="text-2xl font-bold mb-1">My Planner 2026</div>
            <div id="userTagline" contenteditable="true" class="text-sm opacity-70">Custom Profile • Spotify Style</div>

            <!-- Progress Bar -->
            <div class="progress-container" onclick="seek(event)">
                <div class="progress-bar-bg">
                    <div id="progressFill" class="progress-bar-fill"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:45</span>
                    <span id="duration">3:20</span>
                </div>
            </div>

            <!-- Play Controls -->
            <div class="spotify-controls">
                <i class="fa-solid fa-shuffle opacity-50 text-sm"></i>
                <i class="fa-solid fa-backward-step cursor-pointer"></i>
                <div class="play-btn cursor-pointer" onclick="togglePlay(this)">
                    <i class="fa-solid fa-play ml-1"></i>
                </div>
                <i class="fa-solid fa-forward-step cursor-pointer"></i>
                <i class="fa-solid fa-repeat opacity-50 text-sm"></i>
            </div>
        </div>

        <input type="file" id="fileInput" hidden accept="image/*">

        <!-- ข้อมูลส่วนตัวด้านล่าง -->
        <div class="profile-info-grid px-2">
            <div class="info-item">
                <span class="info-label">FULL NAME</span>
                <span class="info-value" id="fullName" contenteditable="true">Somchai Jaidee</span>
            </div>
            <div class="info-item">
                <span class="info-label">BIRTHDAY</span>
                <span class="info-value" id="birthday" contenteditable="true">01 January 2000</span>
            </div>
            <div class="info-item">
                <span class="info-label">TOP GENRE</span>
                <span class="info-value" id="hobbies" contenteditable="true">Coding & Lo-fi Music</span>
            </div>
        </div>

        <div class="text-center mt-6 italic opacity-60 text-sm" id="quote" contenteditable="true">
            "Listening to the rhythm of 2026..."
        </div>
    </div>

    <script>
        let isPlaying = false;
        let progressInterval;

        // ฟังก์ชันหัวใจ (Like)
        function toggleLike() {
            const btn = document.getElementById('heartBtn');
            btn.classList.toggle('liked');
            localStorage.setItem('profileLiked', btn.classList.contains('liked'));
        }

        // ฟังก์ชันเล่น/หยุด
        function togglePlay(btn) {
            const icon = btn.querySelector('i');
            isPlaying = !isPlaying;
            if (isPlaying) {
                icon.className = 'fa-solid fa-pause';
                startProgress();
            } else {
                icon.className = 'fa-solid fa-play ml-1';
                clearInterval(progressInterval);
            }
        }

        // ฟังก์ชันจำลองแถบวิ่ง
        function startProgress() {
            const fill = document.getElementById('progressFill');
            const time = document.getElementById('currentTime');
            let currentSec = 45;
            
            progressInterval = setInterval(() => {
                currentSec++;
                if (currentSec > 200) currentSec = 0;
                
                let min = Math.floor(currentSec / 60);
                let sec = currentSec % 60;
                time.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                fill.style.width = (currentSec / 200 * 100) + '%';
            }, 1000);
        }

        // --- ระบบบันทึกข้อมูลอัตโนมัติ ---
        const fields = ['userName', 'userTagline', 'fullName', 'birthday', 'hobbies', 'quote'];
        
        window.onload = () => {
            fields.forEach(id => {
                const savedValue = localStorage.getItem(id);
                if (savedValue) document.getElementById(id).innerText = savedValue;
            });
            const savedImg = localStorage.getItem('profileImage');
            if (savedImg) document.getElementById('profileImage').src = savedImg;
            
            if (localStorage.getItem('profileLiked') === 'true') {
                document.getElementById('heartBtn').classList.add('liked');
            }
        };

        fields.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                localStorage.setItem(id, document.getElementById(id).innerText);
            });
        });

        // อัปโหลดรูปและบีบอัด
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const size = 500;
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, size, size);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('profileImage').src = dataUrl;
                    localStorage.setItem('profileImage', dataUrl);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>

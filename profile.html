<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Font Awesome สำหรับไอคอน -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --text-dark: #8a516b;
    --header-font: 'Dancing Script', cursive;
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    font-family: 'Mitr', sans-serif;
    color: var(--text-dark);
    margin: 0;
    padding: 20px 10px;
    min-height: 100vh;
}

.profile-board {
    background-color: var(--paper);
    width: 100%;
    max-width: 800px; 
    margin: 0 auto;
    padding: 60px 30px 40px;
    border-radius: 40px;
    box-shadow: 0 15px 40px rgba(235, 122, 166, 0.2);
    border: 3px solid white;
    position: relative;
}

/* สไตล์ปุ่มนำทาง */
.nav-button {
    position: absolute;
    top: 25px;
    background-color: #fffafa;
    color: var(--accent-pink);
    width: 45px;
    height: 45px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    text-decoration: none;
    border: 1px solid rgba(235, 122, 166, 0.2);
    transition: all 0.3s ease;
}

.nav-button:hover {
    background-color: var(--accent-pink);
    color: white;
    transform: translateY(-3px);
}

.btn-home { left: 25px; }
.btn-calendar { right: 25px; }

/* ส่วนแสดงข้อมูลโปรไฟล์ */
.profile-header {
    text-align: center;
    margin-bottom: 30px;
}

.profile-img-container {
    width: 150px;
    height: 150px;
    margin: 0 auto 20px;
    border-radius: 50%;
    border: 5px solid var(--bg-main);
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(235, 122, 166, 0.15);
}

.profile-img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.profile-name {
    font-family: var(--header-font);
    font-size: 3rem;
    color: var(--accent-pink);
    margin: 0;
    text-shadow: 1px 1px 0px #fcf2b6;
}

.profile-info-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-top: 30px;
}

.info-item {
    background: #fffafa;
    padding: 20px;
    border-radius: 20px;
    border: 1px solid rgba(235, 122, 166, 0.1);
}

.info-label {
    font-weight: 600;
    color: var(--accent-pink);
    display: block;
    margin-bottom: 5px;
    font-size: 0.9rem;
    text-transform: uppercase;
}

.info-value {
    font-size: 1.1rem;
    color: var(--text-dark);
}

.quote-section {
    margin-top: 30px;
    text-align: center;
    font-style: italic;
    color: #db96b4;
    padding: 20px;
    border-top: 2px dashed rgba(235, 122, 166, 0.1);
}

@media (max-width: 640px) {
    .profile-board { padding: 80px 20px 30px; }
    .nav-button { width: 40px; height: 40px; font-size: 1rem; top: 15px; }
    .btn-home { left: 15px; }
    .btn-calendar { right: 15px; }
}
</style>
</head>
<body>

    <div class="profile-board">
        <!-- ปุ่มกลับหน้าหลัก -->
        <a href="menu.html" class="nav-button btn-home" title="Back to Menu">
            <i class="fa-solid fa-house"></i>
        </a>

        <!-- ปุ่มไปหน้าปฏิทิน -->
        <a href="calendar.html" class="nav-button btn-calendar" title="Go to Calendar">
            <i class="fa-solid fa-calendar-days"></i>
        </a>

        <div class="profile-header">
            <div class="profile-img-container">
                <!-- ใส่ URL รูปภาพของคุณตรงนี้ -->
                <img src="https://via.placeholder.com/150" alt="Profile Image">
            </div>
            <h1 class="profile-name">My Profile</h1>
            <p style="color: #db96b4;">Planner Enthusiast & Dreamer</p>
        </div>

        <div class="profile-info-grid">
            <div class="info-item">
                <span class="info-label">Name</span>
                <span class="info-value">สมชาย ใจดี (Somchai Jaidee)</span>
            </div>
            
            <div class="info-item">
                <span class="info-label">Birthday</span>
                <span class="info-value">01 January 2000</span>
            </div>

            <div class="info-item">
                <span class="info-label">Favorite Hobbies</span>
                <span class="info-value">Coding, Reading, Digital Planning</span>
            </div>

            <div class="info-item">
                <span class="info-label">Goals for 2026</span>
                <span class="info-value">Mastering Web Development & Learning a new language</span>
            </div>
        </div>

        <div class="quote-section">
            "The best way to predict the future is to create it."
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Modern Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --text-dark: #8a516b;
    --header-font: 'Dancing Script', cursive;
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    font-family: 'Mitr', sans-serif;
    color: var(--text-dark);
    margin: 0;
    padding: 20px 10px;
    min-height: 100vh;
}

.profile-board {
    background-color: var(--paper);
    width: 100%;
    max-width: 850px; 
    margin: 0 auto;
    padding: 60px 30px 40px;
    border-radius: 40px;
    box-shadow: 0 15px 40px rgba(235, 122, 166, 0.2);
    border: 3px solid white;
    position: relative;
}

.nav-group {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
}

.nav-button {
    background-color: #fffafa;
    color: var(--accent-pink);
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    border: 1px solid rgba(235, 122, 166, 0.1);
    transition: all 0.3s ease;
}

.main-layout {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 30px;
    align-items: stretch;
    margin-top: 20px;
}

/* จัดกึ่งกลางรูปภาพแนวตั้ง */
.music-side {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.player-container {
    position: relative;
    width: 210px;
}

.profile-img-container {
    width: 210px;
    height: 210px;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(235, 122, 166, 0.15);
    cursor: pointer;
    border: 5px solid white;
    transition: all 0.3s ease;
}

.profile-img-container.paused {
    opacity: 0.85;
    transform: scale(0.98);
}

.profile-img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.progress-line-container {
    width: 180px;
    height: 4px;
    background: #fffafa;
    margin: 15px auto 0;
    border-radius: 2px;
    overflow: hidden;
}

.progress-line-fill {
    width: 45%;
    height: 100%;
    background: var(--accent-pink);
    border-radius: 2px;
    transition: width 0.3s ease;
}

/* --- Info Content --- */
.info-content {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.profile-title-area {
    border-bottom: 2px dashed #ffdbee;
    padding-bottom: 10px;
}

.profile-name-title {
    font-family: var(--header-font);
    font-size: 2.5rem;
    color: var(--accent-pink);
    line-height: 1;
    margin-bottom: 5px;
}

.info-item {
    background: #fffafa;
    padding: 12px 18px;
    border-radius: 18px;
    border: 1px solid rgba(235, 122, 166, 0.08);
}

.info-label {
    font-weight: 600;
    color: var(--accent-pink);
    font-size: 0.75rem;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
    user-select: none; /* ห้ามเลือกหัวข้อ */
}

/* เฉพาะส่วนที่กรอกได้ */
.editable-value {
    display: block;
    font-size: 1.05rem;
    color: var(--text-dark);
    margin-top: 2px;
    min-height: 1.5em;
    cursor: text;
}

.editable-value:focus {
    outline: none;
    background: rgba(235, 122, 166, 0.05);
    border-radius: 8px;
}

@media (max-width: 768px) {
    .main-layout { grid-template-columns: 1fr; }
    .music-side { padding-bottom: 30px; }
    .profile-board { padding-top: 80px; }
}
</style>
</head>
<body>

    <div class="profile-board">
        <div class="nav-group">
            <a href="menu.html" class="nav-button"><i class="fa-solid fa-house"></i></a>
            <a href="calendar.html" class="nav-button"><i class="fa-solid fa-calendar-days"></i></a>
        </div>

        <div class="main-layout">
            <!-- ซ้าย: รูปภาพอยู่ตรงกลางแนวตั้ง -->
            <div class="music-side">
                <div class="player-container text-center">
                    <div id="discContainer" class="profile-img-container" onclick="document.getElementById('fileInput').click()">
                        <img id="profileImage" src="https://via.placeholder.com/300" alt="Profile">
                    </div>
                    
                    <div class="progress-line-container">
                        <div class="progress-line-fill" id="progressFill"></div>
                    </div>

                    <div class="flex justify-center gap-6 mt-4 text-pink-400">
                        <i class="fa-solid fa-backward-step cursor-pointer hover:text-pink-600 transition"></i>
                        <i id="playPauseBtn" class="fa-solid fa-pause text-xl cursor-pointer hover:text-pink-600 transition" onclick="togglePlay()"></i>
                        <i class="fa-solid fa-forward-step cursor-pointer hover:text-pink-600 transition"></i>
                    </div>
                </div>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>

            <!-- ขวา: ข้อมูล (แก้ไขได้เฉพาะส่วน Value) -->
            <div class="info-content">
                <div class="profile-title-area">
                    <!-- ส่วนชื่อที่แก้ได้ -->
                    <div class="profile-name-title editable-value" id="userName" contenteditable="true">My Profile</div>
                    <div id="userTagline" contenteditable="true" class="editable-value text-sm italic opacity-60">Ready for 2026...</div>
                </div>

                <div class="info-item">
                    <span class="info-label"><i class="fa-solid fa-user-tag text-[10px]"></i> Full Name</span>
                    <span class="editable-value" id="fullName" contenteditable="true">Somchai Jaidee</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label"><i class="fa-solid fa-cake-candles text-[10px]"></i> Birthday</span>
                    <span class="editable-value" id="birthday" contenteditable="true">01 January 2000</span>
                </div>

                <div class="info-item">
                    <span class="info-label"><i class="fa-solid fa-heart text-[10px]"></i> Hobbies</span>
                    <span class="editable-value" id="hobbies" contenteditable="true">Coding, Web Development</span>
                </div>

                <div class="info-item">
                    <span class="info-label"><i class="fa-solid fa-star text-[10px]"></i> Goals for 2026</span>
                    <span class="editable-value" id="goals" contenteditable="true">Create amazing digital products!</span>
                </div>

                <div id="quote" contenteditable="true" class="editable-value text-center mt-4 italic text-sm opacity-50">
                    "Every pixel tells a story."
                </div>
            </div>
        </div>
    </div>

    <script>
        const discContainer = document.getElementById('discContainer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressFill = document.getElementById('progressFill');

        function togglePlay() {
            discContainer.classList.toggle('paused');
            if (discContainer.classList.contains('paused')) {
                playPauseBtn.className = 'fa-solid fa-play text-xl cursor-pointer';
                progressFill.style.width = "15%"; 
            } else {
                playPauseBtn.className = 'fa-solid fa-pause text-xl cursor-pointer';
                progressFill.style.width = "45%";
            }
        }

        const fields = ['userName', 'userTagline', 'fullName', 'birthday', 'hobbies', 'goals', 'quote'];
        
        window.onload = () => {
            fields.forEach(id => {
                const savedValue = localStorage.getItem(id);
                if (savedValue) document.getElementById(id).innerText = savedValue;
            });
            const savedImg = localStorage.getItem('profileImage');
            if (savedImg) document.getElementById('profileImage').src = savedImg;
        };

        fields.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                localStorage.setItem(id, document.getElementById(id).innerText);
            });
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const size = 500; 
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, size, size);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('profileImage').src = dataUrl;
                    localStorage.setItem('profileImage', dataUrl);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>

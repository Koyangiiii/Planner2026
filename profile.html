<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Interactive Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --text-dark: #8a516b;
    --header-font: 'Dancing Script', cursive;
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    font-family: 'Mitr', sans-serif;
    color: var(--text-dark);
    margin: 0;
    padding: 20px 10px;
    min-height: 100vh;
}

.profile-board {
    background-color: var(--paper);
    width: 100%;
    max-width: 800px; 
    margin: 0 auto;
    padding: 80px 30px 40px;
    border-radius: 40px;
    box-shadow: 0 15px 40px rgba(235, 122, 166, 0.2);
    border: 3px solid white;
    position: relative;
}

/* ย้ายกลุ่มปุ่มนำทางมาไว้ด้วยกันที่มุมซ้าย */
.nav-group {
    position: absolute;
    top: 25px;
    left: 25px;
    display: flex;
    gap: 10px;
}

.nav-button {
    background-color: #fffafa;
    color: var(--accent-pink);
    width: 45px;
    height: 45px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    text-decoration: none;
    border: 1px solid rgba(235, 122, 166, 0.2);
    transition: all 0.3s ease;
}

.nav-button:hover {
    background-color: var(--accent-pink);
    color: white;
    transform: translateY(-3px);
}

.profile-header {
    text-align: center;
    margin-bottom: 30px;
}

/* ส่วนรูปภาพที่คลิกเพื่ออัปโหลดได้ */
.profile-img-container {
    width: 150px;
    height: 150px;
    margin: 0 auto 20px;
    border-radius: 50%;
    border: 5px solid var(--bg-main);
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(235, 122, 166, 0.15);
    cursor: pointer;
    position: relative;
}

.profile-img-container:hover::after {
    content: 'Change Photo';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(235, 122, 166, 0.8);
    color: white;
    font-size: 0.7rem;
    padding: 5px 0;
}

.profile-img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ช่องกรอกข้อมูลแบบไร้ขอบ */
[contenteditable="true"] {
    outline: none;
    padding: 2px 5px;
    border-radius: 5px;
    transition: background 0.2s;
}

[contenteditable="true"]:hover {
    background: rgba(235, 122, 166, 0.05);
}

[contenteditable="true"]:focus {
    background: rgba(235, 122, 166, 0.1);
    border-bottom: 1px dashed var(--accent-pink);
}

.profile-name {
    font-family: var(--header-font);
    font-size: 3rem;
    color: var(--accent-pink);
    text-shadow: 1px 1px 0px #fcf2b6;
    display: inline-block;
}

.info-item {
    background: #fffafa;
    padding: 15px 20px;
    border-radius: 20px;
    border: 1px solid rgba(235, 122, 166, 0.1);
    margin-bottom: 15px;
}

.info-label {
    font-weight: 600;
    color: var(--accent-pink);
    font-size: 0.85rem;
    text-transform: uppercase;
}

.info-value {
    display: block;
    font-size: 1.1rem;
    min-height: 1.5em;
}

@media (max-width: 640px) {
    .nav-group { top: 15px; left: 15px; }
    .nav-button { width: 40px; height: 40px; }
}
</style>
</head>
<body>

    <div class="profile-board">
        <div class="nav-group">
            <a href="menu.html" class="nav-button" title="Home"><i class="fa-solid fa-house"></i></a>
            <a href="calendar.html" class="nav-button" title="Calendar"><i class="fa-solid fa-calendar-days"></i></a>
        </div>

        <div class="profile-header">
            <div class="profile-img-container" onclick="document.getElementById('fileInput').click()">
                <img id="profileImage" src="https://via.placeholder.com/150" alt="Profile">
            </div>
            <input type="file" id="fileInput" hidden accept="image/*">
            
            <h1 class="profile-name" id="userName" contenteditable="true">My Profile</h1>
            <p id="userTagline" contenteditable="true" style="color: #db96b4;">Click to edit tagline</p>
        </div>

        <div class="profile-info-grid">
            <div class="info-item">
                <span class="info-label">Full Name</span>
                <span class="info-value" id="fullName" contenteditable="true">Somchai Jaidee</span>
            </div>
            
            <div class="info-item">
                <span class="info-label">Birthday</span>
                <span class="info-value" id="birthday" contenteditable="true">01 January 2000</span>
            </div>

            <div class="info-item">
                <span class="info-label">Hobbies</span>
                <span class="info-value" id="hobbies" contenteditable="true">Coding, Reading</span>
            </div>

            <div class="info-item">
                <span class="info-label">Goals for 2026</span>
                <span class="info-value" id="goals" contenteditable="true">Mastering Web Dev</span>
            </div>
        </div>

        <div class="quote-section" id="quote" contenteditable="true">
            "The best way to predict the future is to create it."
        </div>
    </div>

    <script>
        // บันทึกข้อมูลข้อความอัตโนมัติ
        const fields = ['userName', 'userTagline', 'fullName', 'birthday', 'hobbies', 'goals', 'quote'];
        
        // โหลดข้อมูลเมื่อเปิดหน้า
        window.onload = () => {
            fields.forEach(id => {
                const savedValue = localStorage.getItem(id);
                if (savedValue) document.getElementById(id).innerText = savedValue;
            });
            const savedImg = localStorage.getItem('profileImage');
            if (savedImg) document.getElementById('profileImage').src = savedImg;
        };

        // ตรวจจับการพิมพ์และบันทึกอัตโนมัติ (Debounce)
        fields.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                localStorage.setItem(id, document.getElementById(id).innerText);
            });
        });

        // จัดการเรื่องรูปภาพ (Upload & Compress)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // สร้าง Canvas เพื่อบีบอัดรูป
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 300; // บีบขนาดให้ไม่เกิน 300px
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_WIDTH) {
                            width *= MAX_WIDTH / height;
                            height = MAX_WIDTH;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // แปลงเป็น Base64 และบันทึก
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // คุณภาพ 70%
                    document.getElementById('profileImage').src = dataUrl;
                    localStorage.setItem('profileImage', dataUrl);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>

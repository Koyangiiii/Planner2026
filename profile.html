<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Modern Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --text-dark: #8a516b;
    --header-font: 'Dancing Script', cursive;
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    font-family: 'Mitr', sans-serif;
    color: var(--text-dark);
    margin: 0;
    padding: 20px 10px;
    min-height: 100vh;
}

.profile-board {
    background-color: var(--paper);
    width: 100%;
    max-width: 850px; 
    margin: 0 auto;
    padding: 60px 30px 40px;
    border-radius: 40px;
    box-shadow: 0 15px 40px rgba(235, 122, 166, 0.2);
    border: 3px solid white;
    position: relative;
}

.nav-group {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
}

.nav-button {
    background-color: #fffafa;
    color: var(--accent-pink);
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    border: 1px solid rgba(235, 122, 166, 0.1);
    transition: all 0.3s ease;
}

/* หัวข้อ My Profile แบบใหม่ */
.profile-static-title {
    font-family: var(--header-font);
    font-size: 3.8rem;
    color: var(--accent-pink);
    margin: 0;
    line-height: 1;
    text-shadow: 3px 3px 0px #fff, 5px 5px 15px rgba(235, 122, 166, 0.3);
    user-select: none;
    letter-spacing: 2px;
    text-align: center;
}

.profile-title-area {
    border-bottom: 2px dashed #ffdbee;
    padding-bottom: 20px;
    margin-bottom: 25px;
    text-align: center;
}

.main-layout {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 30px;
    align-items: stretch;
}

.music-side {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.player-container {
    position: relative;
    width: 210px;
}

.profile-img-container {
    width: 210px;
    height: 210px;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(235, 122, 166, 0.15);
    cursor: pointer;
    border: 5px solid white;
    transition: all 0.3s ease;
}

.profile-img-container.paused {
    opacity: 0.85;
    transform: scale(0.98);
}

.profile-img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.progress-line-container {
    width: 180px;
    height: 4px;
    background: #fffafa;
    margin: 15px auto 0;
    border-radius: 2px;
    overflow: hidden;
}

.progress-line-fill {
    width: 45%;
    height: 100%;
    background: var(--accent-pink);
    border-radius: 2px;
    transition: width 0.3s ease;
}

.info-content {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.info-item {
    background: #fffafa;
    padding: 12px 18px;
    border-radius: 18px;
    border: 1px solid rgba(235, 122, 166, 0.08);
}

.info-label {
    font-weight: 600;
    color: var(--accent-pink);
    font-size: 0.75rem;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
    user-select: none;
}

.editable-value {
    display: block;
    font-size: 1.05rem;
    color: var(--text-dark);
    margin-top: 2px;
    min-height: 1.5em;
    cursor: text;
}

    outline: none;
    background: rgba(235, 1

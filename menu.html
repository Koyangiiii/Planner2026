<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Menu</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --text-dark: #8a516b;
    --line-color: rgba(235, 122, 166, 0.3);
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    font-family: 'Mitr', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 20px;
}

/* เพิ่มกระดานสีขาวหลักกลับมา */
.calendar-board {
    background-color: var(--paper);
    width: 100%;
    max-width: 700px; 
    padding: 60px 40px;
    border-radius: 40px;
    box-shadow: 0 15px 40px rgba(235, 122, 166, 0.2);
    border: 3px solid white;
    text-align: center;
}

.menu-title {
    color: var(--accent-pink);
    font-size: 1.8rem;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* เส้นคั่น */
.divider {
    border: none;
    height: 1px;
    background-color: var(--accent-pink);
    opacity: 0.3;
    margin: 25px auto;
    width: 100%;
}

/* Container สำหรับเมนูแนวนอน */
.menu-container {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 40px; /* เพิ่มระยะห่างระหว่างข้อความ */
}

/* เมนูแบบไม่มีกรอบและไม่มีลูกศร */
.menu-item {
    text-decoration: none; 
    color: var(--text-dark);
    font-weight: 500;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    padding: 5px 0;
}

.menu-item:hover {
    color: var(--accent-pink);
    transform: translateY(-2px);
}

/* เพิ่มเส้นใต้เบาๆ ตอน Hover แทนลูกศร */
.menu-item::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: var(--accent-pink);
    transition: width 0.3s ease;
}

.menu-item:hover::after {
    width: 100%;
}
</style>
</head>
<body>

    <!-- กระดานขาวหลัก (calendar-board) -->
    <div class="calendar-board">
        
        <h2 class="menu-title">Main Menu</h2>

        <!-- เส้นคั่นบน -->
        <hr class="divider">

        <div class="menu-container">
            
            <a href="profile.html" class="menu-item">
                <span>ประวัติส่วนตัว</span>
            </a>

            <a href="calendar.html" class="menu-item">
                <span>Calendar</span>
            </a>

            <a href="diary.html" class="menu-item">
                <span>Diary</span>
            </a>
            
        </div>

        <!-- เส้นคั่นล่าง -->
        <hr class="divider">

    </div>

</body>
</html>

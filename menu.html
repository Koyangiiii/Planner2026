<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Menu</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--bg-main: #ffe6f0;
--paper: #ffffff;
--accent-pink: #eb7aa6;
--text-dark: #8a516b;
--line-color: rgba(235, 122, 166, 0.15);
}

body {
background-color: var(--bg-main);
background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
font-family: 'Mitr', sans-serif;
color: var(--text-dark);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
margin: 0;
}

/* ลบส่วน menu-card ออก แล้วใช้ wrapper ธรรมดาแทน */
.menu-wrapper {
    width: 100%;
    max-width: 800px;
    padding: 20px;
    text-align: center;
}

.menu-title {
    color: var(--accent-pink);
    font-size: 1.5rem; /* ปรับขนาดขึ้นเล็กน้อยให้เด่น */
    font-weight: 600;
    margin-bottom: 40px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 1px 1px 0px white; /* เพิ่มเงาขาวให้อ่านง่ายขึ้นบนพื้นหลังสีอ่อน */
}

/* Container สำหรับเมนูแนวนอน */
.menu-container {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* ปรับสไตล์ปุ่มให้ดูเป็นชิ้นเป็นอันขึ้นเมื่อไม่มีกรอบครอบ */
.menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--paper); /* ใช้สีขาวเพื่อให้ปุ่มดูโดดเด่นจากพื้นหลัง */
    padding: 18px 28px;
    border-radius: 50px; /* ปรับให้โค้งมนเป็นทรงแคปซูล */
    text-decoration: none; 
    color: var(--text-dark);
    font-weight: 500;
    font-size: 1.1rem;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 2px solid white;
    box-shadow: 0 10px 20px rgba(235, 122, 166, 0.1);
    cursor: pointer;
}

.menu-item:hover {
    transform: translateY(-8px);
    background: var(--accent-pink);
    color: white;
    border-color: var(--accent-pink);
    box-shadow: 0 15px 25px rgba(235, 122, 166, 0.25);
}

.menu-arrow {
    font-size: 0.9rem;
    opacity: 0.5;
}

.menu-item:hover .menu-arrow {
    opacity: 1;
    transform: translateX(3px);
    transition: transform 0.2s ease;
}
</style>
</head>
<body>

    <!-- ใช้ Wrapper แทน Card -->
    <div class="menu-wrapper">
        
        <h2 class="menu-title">Main Menu</h2>

        <div class="menu-container">
            
            <a href="profile.html" class="menu-item">
                <span>ประวัติส่วนตัว</span>
                <span class="menu-arrow">►</span>
            </a>

            <a href="calendar.html" class="menu-item">
                <span>Calendar</span>
                <span class="menu-arrow">►</span>
            </a>

            <a href="diary.html" class="menu-item">
                <span>Diary</span>
                <span class="menu-arrow">►</span>
            </a>
            
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Menu</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #ffe6f0;
    --paper: #ffffff;
    --accent-pink: #eb7aa6;
    --text-dark: #8a516b;
    --line-color: rgba(235, 122, 166, 0.3);
}

body {
    background-color: var(--bg-main);
    background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
    font-family: 'Mitr', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
}

/* ลบกรอบขาว (card) ออก ให้เหลือแค่โครงสร้างจัดการตำแหน่ง */
.menu-wrapper {
    width: 95%;
    max-width: 600px;
    padding: 20px;
    text-align: center;
}

.menu-title {
    color: var(--accent-pink);
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* เส้นคั่น */
.divider {
    border: none;
    height: 1px;
    background-color: var(--accent-pink);
    opacity: 0.4;
    margin: 20px auto;
    width: 100%;
}

/* Container สำหรับเมนูแนวนอน */
.menu-container {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px; /* เพิ่มระยะห่างระหว่างข้อความ */
}

/* เมนูแบบไม่มีกรอบ (Text only) */
.menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none; 
    color: var(--text-dark);
    font-weight: 500;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    cursor: pointer;
    padding: 5px 0;
}

.menu-item:hover {
    color: var(--accent-pink);
    transform: scale(1.05);
}

.menu-arrow {
    font-size: 0.8rem;
    color: var(--accent-pink);
    opacity: 0.6;
}

.menu-item:hover .menu-arrow {
    opacity: 1;
}
</style>
</head>
<body>

    <div class="menu-wrapper">
        
        <h2 class="menu-title">Main Menu</h2>

        <!-- เส้นคั่นบน -->
        <hr class="divider">

        <div class="menu-container">
            
            <a href="profile.html" class="menu-item">
                <span>ประวัติส่วนตัว</span>
                <span class="menu-arrow">►</span>
            </a>

            <a href="calendar.html" class="menu-item">
                <span>Calendar</span>
                <span class="menu-arrow">►</span>
            </a>

            <a href="diary.html" class="menu-item">
                <span>Diary</span>
                <span class="menu-arrow">►</span>
            </a>
            
        </div>

        <!-- เส้นคั่นล่าง -->
        <hr class="divider">

    </div>

</body>
</html>

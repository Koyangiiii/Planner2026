<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Menu</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--bg-main: #ffe6f0;
--paper: #ffffff;
--accent-pink: #eb7aa6;
--text-dark: #8a516b;
--line-color: rgba(235, 122, 166, 0.15);
}

body {
background-color: var(--bg-main);
background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
font-family: 'Mitr', sans-serif;
color: var(--text-dark);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
margin: 0;
}

/* ปรับความกว้างกรอบให้กว้างขึ้นเพื่อรองรับแนวนอน */
.menu-card {
    background-color: var(--paper);
    width: 95%;
    max-width: 600px;
    padding: 40px 20px;
    border-radius: 35px;
    box-shadow: 0 15px 35px rgba(235, 122, 166, 0.2);
    position: relative;
    border: 2px solid white;
}

.menu-title {
    color: var(--accent-pink);
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 30px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* Container สำหรับเมนูแนวนอน */
.menu-container {
    display: flex;
    flex-direction: row; /* เรียงไปทางขวา */
    flex-wrap: wrap;    /* ถ้าล้นให้ลงมาบรรทัดใหม่ */
    justify-content: center;
    gap: 15px;          /* ระยะห่างระหว่างปุ่ม */
}

/* ปรับขนาดปุ่มเมนูให้พอดีกับการเรียงขวา */
.menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fffafa;
    padding: 15px 20px;
    border-radius: 18px;
    text-decoration: none; 
    color: var(--text-dark);
    font-weight: 500;
    font-size: 1rem;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1.5px solid var(--line-color);
    cursor: pointer;
    flex: 0 1 auto; /* ขนาดตามเนื้อหา */
}

.menu-item:hover {
    transform: translateY(-5px);
    background: var(--accent-pink);
    color: white;
    border-color: var(--accent-pink);
    box-shadow: 0 8px 15px rgba(235, 122, 166, 0.2);
}

.menu-arrow {
    font-size: 0.8rem;
    opacity: 0.6;
}

.menu-item:hover .menu-arrow {
    opacity: 1;
}

/* ตกแต่งรูเจาะกระดาษ */
.menu-card::before {
    content: '';
    position: absolute;
    left: 12px;
    top: 20%;
    height: 60%;
    width: 6px;
    background-image: radial-gradient(circle, #ffd1e3 3px, transparent 3px);
    background-size: 100% 25px;
    opacity: 0.8;
}
</style>
</head>
<body>

    <div class="menu-card text-center">
        
        <h2 class="menu-title">Main Menu</h2>

        <!-- เปลี่ยนเป็น flex-row ผ่าน class menu-container -->
        <div class="menu-container">
            
            <a href="profile.html" class="menu-item">
                <span>ประวัติส่วนตัว</span>
                <span class="menu-arrow">►</span>
            </a>

            <a href="calendar.html" class="menu-item">
                <span>Calendar</span>
                <span class="menu-arrow">►</span>
            </a>

            <!-- ตัวอย่างถ้าเพิ่มเมนูที่ 3 จะเรียงไปทางขวาต่อ -->
            <!-- 
            <a href="gallery.html" class="menu-item">
                <span>Gallery</span>
                <span class="menu-arrow">►</span>
            </a>
            -->
            
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planner2026 - Menu</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--bg-main: #ffe6f0;
--paper: #ffffff;
--accent-pink: #eb7aa6;
--text-dark: #8a516b;
--line-color: rgba(235, 122, 166, 0.15);
}

body {
background-color: var(--bg-main);
background-image: repeating-linear-gradient(to right, #ffe6f0, #ffe6f0 40px, #ffdbee 40px, #ffdbee 80px);
font-family: 'Mitr', sans-serif;
color: var(--text-dark);
overflow-x: hidden;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
margin: 0;
}

/* กรอบข้อความสีขาว */
.menu-card {
    background-color: var(--paper);
    width: 90%;
    max-width: 400px;
    padding: 40px 25px;
    border-radius: 35px;
    box-shadow: 0 15px 35px rgba(235, 122, 166, 0.2);
    position: relative;
    border: 2px solid white;
}

/* หัวข้อเมนู */
.menu-title {
    color: var(--accent-pink);
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 25px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* ปุ่มเมนู */
.menu-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fffafa;
    padding: 20px 25px;
    margin-bottom: 12px;
    border-radius: 20px;
    text-decoration: none; /* เอาเส้นใต้ลิงก์ออก */
    color: var(--text-dark);
    font-weight: 500;
    font-size: 1.1rem;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1.5px solid var(--line-color);
    cursor: pointer;
}

/* เอฟเฟกต์ตอนเอาเม้าส์วาง */
.menu-item:hover {
    transform: translateY(-5px) scale(1.02);
    background: var(--accent-pink);
    color: white;
    border-color: var(--accent-pink);
    box-shadow: 0 8px 20px rgba(235, 122, 166, 0.3);
}

.menu-arrow {
    font-size: 0.9rem;
    transition: transform 0.3s ease;
}

.menu-item:hover .menu-arrow {
    transform: translateX(5px);
}

/* ตกแต่งรูเจาะกระดาษ */
.menu-card::before {
    content: '';
    position: absolute;
    left: 12px;
    top: 20%;
    height: 60%;
    width: 6px;
    background-image: radial-gradient(circle, #ffd1e3 3px, transparent 3px);
    background-size: 100% 25px;
    opacity: 0.8;
}
</style>
</head>
<body>

    <div class="menu-card text-center">
        
        <h2 class="menu-title">Main Menu</h2>

        <div class="flex flex-col">
            <!-- เชื่อมลิงก์ไปหน้า profile.html -->
            <a href="profile.html" class="menu-item">
                <span>ประวัติส่วนตัว</span>
                <span class="menu-arrow">►</span>
            </a>

            <!-- ตัวอย่างเมนูอื่นๆ ที่เพิ่มได้ในอนาคต -->
            <!-- 
            <a href="portfolio.html" class="menu-item">
                <span>ผลงานของฉัน</span>
                <span class="menu-arrow">►</span>
            </a> 
            -->
        </div>

    </div>

</body>
</html>
